# Mosquitto MQTT Broker Configuration for SmartPlug PC Telemetry
# Place this file in: C:\Program Files\mosquitto\mosquitto.conf
# Or in the mosquitto installation directory

# Default listener on port 1883
listener 1883

# Allow anonymous connections (no authentication required)
allow_anonymous true

# Persistence settings
persistence true
persistence_location C:\mosquitto\data\

# Log settings
log_dest file C:\mosquitto\log\mosquitto.log
log_dest console

# Connection settings
max_connections -1

# Message settings
max_queued_messages 1000
message_size_limit 0
